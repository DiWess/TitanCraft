name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install Godot 4.7 .NET
        run: |
          curl -L -o godot.zip https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_mono_linux_x86_64.zip
          unzip godot.zip -d godot
          sudo ln -s "$PWD/godot/Godot_v4.7-stable_mono_linux_x86_64/Godot_v4.7-stable_mono_linux.x86_64" /usr/local/bin/godot
          godot --headless --version | grep '4.7.stable.mono.official.5b4e0cb0f'
      - run: ./tools/test.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-test-results
          path: |
            tests/TestResults
            builds/Windows/TitanCraft.exe

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Install Godot 4.7 .NET
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_mono_win64.zip -OutFile godot.zip
          Expand-Archive godot.zip -DestinationPath godot
          "$PWD/godot/Godot_v4.7-stable_mono_win64" | Out-File -FilePath $env:GITHUB_PATH -Append
          godot --headless --version | Select-String '4.7.stable.mono.official.5b4e0cb0f'
      - run: ./tools/test.ps1
        shell: pwsh
      - name: Native exported smoke
        shell: pwsh
        run: |
          $p = Start-Process -FilePath builds/Windows/TitanCraft.exe -ArgumentList '--headless','--quit-after','120' -PassThru
          if (-not $p.WaitForExit(30000)) { $p.Kill(); throw 'Exported build timeout' }
          if ($p.ExitCode -ne 0) { throw "Exported build failed with $($p.ExitCode)" }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-build-and-test-results
          path: |
            tests/TestResults
            builds/Windows
