version: 1

# TitanCraft Agent Studio ownership rights.
#
# This file is the machine-readable source of truth for "who owns this file".
# Root AGENTS.md section 11 defines the rules; this index defines the mapping.
#
# Resolution: python3 tools/agent_ownership.py <path>
# Validation: python3 tools/validate_agent_studio.py
#
# Every entry must declare path, owner, reviewers, and rights.
# Every owner and reviewer must be a real file in studio/agents/, or the
# reserved owner `human`. Each agent file must declare the same paths under
# its `## Owned Paths` heading; validate_agent_studio.py fails on drift.

rights_vocabulary:
  agent_write: Owner may author changes to the path inside an authorized task, then satisfy the listed reviewers.
  human_approval_required: No agent may change the path without explicit human instruction in the task. The owner acts as steward and reviewer only.

precedence: most_specific_path_wins

unmatched_path_rule: A path with no matching entry is unowned. Unowned paths must be routed to the producer and added to this index before an agent changes them.

ownership:
  # --- Constitutional documents: human-owned, never agent-owned ---
  - path: README.md
    owner: human
    reviewers: [game_director, producer]
    rights: human_approval_required
  - path: AGENTS.md
    owner: human
    reviewers: [producer, qa_lead]
    rights: human_approval_required
  - path: CLAUDE.md
    owner: human
    reviewers: [producer, technical_director]
    rights: human_approval_required
  - path: PROJECT_DIRECTOR_START_HERE.md
    owner: human
    reviewers: [producer]
    rights: human_approval_required

  # --- Agent Studio governance ---
  - path: studio/agents/**
    owner: producer
    reviewers: [qa_lead, technical_director]
    rights: agent_write
  - path: studio/indexes/**
    owner: producer
    reviewers: [qa_lead, technical_director]
    rights: agent_write
  - path: studio/memory/**
    owner: producer
    reviewers: [qa_lead]
    rights: agent_write
  - path: studio/skills/**
    owner: producer
    reviewers: [qa_lead]
    rights: agent_write
  - path: studio/checklists/**
