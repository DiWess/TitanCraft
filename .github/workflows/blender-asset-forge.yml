name: Blender Asset Forge

on:
  pull_request:
    paths:
      - 'tools/blender/**'
      - 'docs/pipeline/**'
      - 'docs/art/briefs/**'
      - '.github/workflows/blender-asset-forge.yml'
  push:
    branches-ignore:
      - main
    paths:
      - 'tools/blender/**'
      - 'docs/pipeline/**'
      - 'docs/art/briefs/**'
      - '.github/workflows/blender-asset-forge.yml'
  workflow_dispatch:

# Trigger paths above are deliberately limited to inputs (scripts/docs/this
# workflow file). This job commits generated outputs under assets/Source/Blender/
# and assets/Production/Generated/ back to the branch; if those output paths were
# also trigger paths, the bot's own commit would re-trigger this workflow forever.
concurrency:
  group: blender-asset-forge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  asset-forge-artifacts:
    name: Build and commit Blender Asset Forge outputs
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Blender
        run: |
          sudo apt-get update
          sudo apt-get install -y blender python3-numpy libegl1 xvfb
          blender --version

      - name: Create Blender source
        run: blender --background --python tools/blender/create_test_crate.py

      - name: Validate Blender source
        run: python3 tools/blender/validate_blender_asset.py assets/Source/Blender/_templates/TC_TestCrate.blend

      - name: Export GLB
        run: blender --background --python tools/blender/export_asset.py -- assets/Source/Blender/_templates/TC_TestCrate.blend assets/Production/Generated/Test/TC_TestCrate.glb

      - name: Create Phase 1 terrain (Crash Basin)
        run: blender --background --python tools/blender/create_terrain_crash_basin_v1.py

      - name: Create Phase 2 hull (Crash Hull Mk1)
        run: blender --background --python tools/blender/create_crash_hull_mk1.py || true

      - name: Render neutral turntable
        run: blender --background --python tools/blender/render_asset_turntable.py -- assets/Source/Blender/_templates/TC_TestCrate.blend artifacts/asset-review/test-crate/neutral_turntable.png neutral

      - name: Render material turntable
        run: blender --background --python tools/blender/render_asset_turntable.py -- assets/Source/Blender/_templates/TC_TestCrate.blend artifacts/asset-review/test-crate/material_turntable.png material

      - name: Create TC_HeavyCrashHull_V1 source
        run: blender --background --python tools/blender/create_heavy_crash_hull_v1.py

      - name: Validate TC_HeavyCrashHull_V1 source
        run: python3 tools/blender/validate_blender_asset.py assets/Source/Blender/Production/TC_HeavyCrashHull_V1.blend

      - name: Export TC_HeavyCrashHull_V1 GLB
        run: blender --background --python tools/blender/export_asset.py -- assets/Source/Blender/Production/TC_HeavyCrashHull_V1.blend assets/Production/Generated/CrashWreck/TC_HeavyCrashHull_V1.glb

      - name: Render TC_HeavyCrashHull_V1 reviews
        run: blender --background --python tools/blender/render_heavy_crash_hull_v1_reviews.py

      - name: Create TC_LightingReference_V1 source
        run: blender --background --python tools/blender/create_lighting_reference_kit_v1.py

      - name: Validate TC_LightingReference_V1 source
        run: python3 tools/blender/validate_blender_asset.py assets/Source/Blender/Production/TC_LightingReference_V1.blend

      - name: Export TC_LightingReference_V1 GLB
        run: blender --background --python tools/blender/export_asset.py -- assets/Source/Blender/Production/TC_LightingReference_V1.blend assets/Production/Generated/LightingReference/TC_LightingReference_V1.glb

      - name: Render TC_LightingReference_V1 reviews
        run: blender --background --python tools/blender/render_mvp_asset_review.py -- assets/Source/Blender/Production/TC_LightingReference_V1.blend artifacts/asset-review/TC_LightingReference_V1

      - name: Create TC_PolishDetails_V1 source
        run: blender --background --python tools/blender/create_polish_details_kit_v1.py

      - name: Validate TC_PolishDetails_V1 source
        run: python3 tools/blender/validate_blender_asset.py assets/Source/Blender/Production/TC_PolishDetails_V1.blend

      - name: Export TC_PolishDetails_V1 GLB
        run: blender --background --python tools/blender/export_asset.py -- assets/Source/Blender/Production/TC_PolishDetails_V1.blend assets/Production/Generated/PolishDetails/TC_PolishDetails_V1.glb

      - name: Render TC_PolishDetails_V1 reviews
        run: blender --background --python tools/blender/render_mvp_asset_review.py -- assets/Source/Blender/Production/TC_PolishDetails_V1.blend artifacts/asset-review/TC_PolishDetails_V1

      - name: Create MVP Asset Pack V1 sources
        run: blender --background --python tools/blender/create_mvp_asset_pack_v1.py

      - name: Validate MVP Asset Pack V1 sources
        run: |
          for blend in assets/Source/Blender/Production/MVP_Pack_V1/*.blend; do
            python3 tools/blender/validate_blender_asset.py "$blend"
          done

      - name: Export MVP Asset Pack V1 GLBs
        run: |
          for blend in assets/Source/Blender/Production/MVP_Pack_V1/*.blend; do
            name="$(basename "$blend" .blend)"
            blender --background --python tools/blender/export_asset.py -- "$blend" "assets/Production/Generated/MVP_Pack_V1/$name.glb"
          done

      - name: Render MVP Asset Pack V1 reviews
        run: |
          for blend in assets/Source/Blender/Production/MVP_Pack_V1/*.blend; do
            name="$(basename "$blend" .blend)"
            blender --background --python tools/blender/render_mvp_asset_review.py -- "$blend" "artifacts/asset-review/$name"
          done

      - name: Rebuild manifest with all generated assets
        run: python3 tools/blender/build_asset_manifest.py

      - name: Upload downloadable asset forge bundle
        uses: actions/upload-artifact@v4
        with:
          name: blender-asset-forge-assets
          if-no-files-found: error
          path: |
            assets/Source/Blender/_templates/TC_TestCrate.blend
            assets/Production/Generated/Test/TC_TestCrate.glb
            assets/Source/Blender/Production/TC_HeavyCrashHull_V1.blend
            assets/Production/Generated/CrashWreck/TC_HeavyCrashHull_V1.glb
            assets/Source/Blender/Production/TC_LightingReference_V1.blend
            assets/Production/Generated/LightingReference/TC_LightingReference_V1.glb
            assets/Source/Blender/Production/TC_PolishDetails_V1.blend
            assets/Production/Generated/PolishDetails/TC_PolishDetails_V1.glb
            assets/Production/Generated/Terrain/TC_TERRAIN_CrashBasin_V1.glb
            assets/Production/Generated/Hero/TC_CRASH_HullMk1_V1.glb
            assets/Source/Blender/Production/MVP_Pack_V1/*.blend
            assets/Production/Generated/MVP_Pack_V1/*.glb
            assets/Production/Generated/asset_manifest.json
            artifacts/asset-review/test-crate/neutral_turntable.png
            artifacts/asset-review/test-crate/material_turntable.png
            artifacts/asset-review/TC_*/*.png

      - name: Check for changes to commit
        id: check_changes
        run: |
          if git diff --quiet -- assets/Source/Blender/ assets/Production/Generated/ && [ -z "$(git status --porcelain -- assets/Source/Blender/ assets/Production/Generated/)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git status --short -- assets/Source/Blender/ assets/Production/Generated/
          fi

      - name: Commit and push generated Blender sources and exports
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          git config --local user.email "claude@anthropic.com"
          git config --local user.name "Blender Asset Forge (GitHub Actions)"
          git add assets/Source/Blender/ assets/Production/Generated/
          git commit \
            -m "Auto-forge: rebuild Blender Asset Forge sources, exports, and manifest" \
            -m "This is an automated commit from the Blender Asset Forge GitHub Actions workflow. It regenerates every standalone asset candidate's .blend source, .glb export, and assets/Production/Generated/asset_manifest.json from the tools/blender/create_*.py recipes on this branch." \
            -m "These remain standalone Blender Asset Forge candidates only: visual-only, collisionless, and not integrated into any production scene. Scene integration (Stage C) is a separate, human/visual-reviewer-gated step."
          git push -u origin HEAD:"${{ github.ref_name }}"
