name: TitanCraft MVP Gameplay Evidence

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'tools/test.sh'
      - 'tools/testing/**'
      - 'scenes/Main/**'
      - '.github/workflows/mvp-gameplay-evidence.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mvp-gameplay-evidence:
    name: Generate Crash Site MVP gameplay evidence
    runs-on: ubuntu-latest
    env:
      DOTNET_VERSION: '8.0.x'
      GODOT_RELEASE_URL: https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_mono_linux_x86_64.zip
      GODOT_EXPECTED_VERSION: 4.7.stable.mono.official.5b4e0cb0f
      RESULTS_DIR: tests/TestResults

    steps:
      # Check out the repository so the workflow validates the exact pull request content.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install the .NET SDK used by the Godot 4 .NET project and unit tests.
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Install Linux runtime packages needed by the existing Godot CI pattern.
      - name: Install Linux Godot dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            libasound2t64 \
            libgbm1 \
            libgl1-mesa-dri \
            libglx-mesa0 \
            libpulse0 \
            libvulkan1 \
            libwayland-cursor0 \
            libxcursor1 \
            libxi6 \
            libxinerama1 \
            libxkbcommon0 \
            mesa-vulkan-drivers \
            unzip

      # Install the same Godot 4.7 .NET Linux editor used by existing repository CI.
      - name: Install Godot 4.7 .NET
        run: |
          curl -L "$GODOT_RELEASE_URL" -o /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mkdir -p /opt/godot
          sudo cp -R /tmp/godot/Godot_v4.7-stable_mono_linux_x86_64/* /opt/godot/
          sudo ln -sf /opt/godot/Godot_v4.7-stable_mono_linux.x86_64 /usr/local/bin/godot
          godot --headless --version | grep "$GODOT_EXPECTED_VERSION"

      # Materialize generated temporary audio before direct Godot import or scene execution.
      - name: Prepare temporary audio assets
        run: python3 tools/prepare_audio_assets.py

      # Keep explicit restore and build commands visible as standalone gameplay evidence gates.
      - name: Restore .NET packages
        run: dotnet restore

      - name: Build .NET project
        run: dotnet build

      # Run the unit test path and write the TRX file requested in the evidence artifact.
      - name: Run unit tests
        run: |
          mkdir -p "$RESULTS_DIR"
          dotnet test --settings tests/TitanCraft.runsettings --logger "trx;LogFileName=unit.trx" --results-directory "$RESULTS_DIR"

      # Run the direct Godot import gate and preserve its log for artifact upload when present.
      - name: Import Godot project
        run: |
          set -o pipefail
          mkdir -p "$RESULTS_DIR"
          godot --headless --path . --import 2>&1 | tee "$RESULTS_DIR/import.log"

      # Execute the integration runner directly so milestone verification is not inferred.
      - name: Run Crash Site integration runner
        run: |
          set -o pipefail
          mkdir -p "$RESULTS_DIR"
          godot --headless --path . tests/Integration/IntegrationTestRunner.tscn 2>&1 | tee "$RESULTS_DIR/integration.log"

      # Fail closed when any locked MVP smoke milestone marker is absent from the integration log.
      - name: Verify MVP smoke milestone markers
        run: python3 tools/testing/verify_mvp_smoke_log.py tests/TestResults/integration.log

      # Print a compact milestone summary for the GitHub Actions log and job summary.
      - name: Print compact milestone summary
        run: |
          python3 tools/testing/verify_mvp_smoke_log.py tests/TestResults/integration.log | tee "$RESULTS_DIR/mvp_milestones.txt"
          {
            echo '## Crash Site MVP smoke milestones'
            echo ''
            cat "$RESULTS_DIR/mvp_milestones.txt"
          } >> "$GITHUB_STEP_SUMMARY"

      # Run the existing full automated test path after the explicit gates above.
      - name: Run existing automated test path
        run: ./tools/test.sh

      # Catch whitespace and patch formatting problems after generated ignored artifacts are produced.
      - name: Check git diff whitespace
        run: git diff --check

      # Upload every available gameplay QA evidence log/result from the test results directory.
      - name: Upload MVP gameplay evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mvp-gameplay-evidence
          path: |
            tests/TestResults/unit.trx
            tests/TestResults/integration.log
            tests/TestResults/import.log
            tests/TestResults/smoke.log
            tests/TestResults/export.log
            tests/TestResults/**/*.log
            tests/TestResults/**/*.trx
            tests/TestResults/**/*.txt
          if-no-files-found: warn
