version: 1
requirements:
  visual:
    - PNG screenshots
    - visual diagnosis naming focal point, route readability, silhouette, scale, material coherence
    - before/after comparison
    - Blender source/export/provenance/hash evidence when Blender assets are changed
    - human-review or visual-reviewer verdict
  gameplay:
    - README Crash Site MVP scope confirmation
    - changed gameplay or governance files list
    - unit tests when behavior changes, including isolated gameplay logic
    - integration tests when systems interact, including inventory, crafting, mission, enemy, save, HUD, beacon, victory, or defeat
    - mission smoke test or documented manual procedure covering relevant spawn, resource collection, crafting, Galaxabrain Scout combat, component retrieval, beacon activation, victory, defeat, and save continuation checkpoints
    - manual Godot playtest note or procedure for movement, combat, objective clarity, or game-feel claims
    - runtime flags or logs when applicable
  asset:
    - source URL
    - licence
    - file hash
    - audition screenshot
    - classification as production, placeholder, rejected, or reference-only
  build:
    - exact command output
    - artifact path
    - failure class
    - environment limitation if blocked
  release:
    - fresh artifact metadata
    - hash
    - lane classification
    - explicit NOT_GO unless all release gates pass
    - cited evidence artifact for every FPS, draw-call, GPU-ms, or similar performance number (studio/decisions/quality_benchmark_v1.md rule 1)
    - dated human playtest note for any movement/combat/level "feel" claim (studio/decisions/quality_benchmark_v1.md rule 2)
    - named peer anchor, target score, and gap from studio/decisions/quality_benchmark_v1.md for any axis the verdict claims is ready (rule 3)
  documentation:
    - requested doc objective
    - files changed
    - validation command
  architecture:
    - changed scene or architecture files
    - runtime safety evidence
    - collision or node contract notes when applicable
    - visual screenshot when scene readability is claimed
