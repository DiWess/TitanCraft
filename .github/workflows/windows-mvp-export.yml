name: TitanCraft Windows MVP Export

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'scenes/**'
      - 'tests/**'
      - 'tools/**'
      - 'docs/release/**'
      - 'project.godot'
      - 'export_presets.cfg'
      - '.github/workflows/windows-mvp-export.yml'

permissions:
  contents: read

jobs:
  export-windows-mvp:
    name: Export Windows MVP artifact
    runs-on: ubuntu-latest
    env:
      DOTNET_VERSION: 8.0.x
      GODOT_VERSION: 4.7-stable
      GODOT_TEMPLATE_VERSION: 4.7.stable.mono
      GODOT_RELEASE_URL: https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_mono_linux_x86_64.zip
      GODOT_TEMPLATES_URL: https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_mono_export_templates.tpz
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set up Godot .NET with export templates
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl libasound2t64 libgbm1 libgl1-mesa-dri libglx-mesa0 libpulse0 libvulkan1 libwayland-cursor0 libxcursor1 libxi6 libxinerama1 libxkbcommon0 unzip
          curl -L "$GODOT_RELEASE_URL" -o /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          GODOT_EXE="/tmp/godot/Godot_v${GODOT_VERSION}_mono_linux_x86_64/Godot_v${GODOT_VERSION}_mono_linux.x86_64"
          test -f "$GODOT_EXE"
          chmod +x "$GODOT_EXE"
          sudo ln -sf "$GODOT_EXE" /usr/local/bin/godot
          godot --headless --version | grep '4.7.stable.mono.official.5b4e0cb0f'
          curl -L "$GODOT_TEMPLATES_URL" -o /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates_extract
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          cp -R /tmp/templates_extract/templates/. "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}/"
          test -f "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}/windows_release_x86_64.exe"

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Build .NET project
        run: dotnet build

      - name: Prepare generated audio assets
        run: python3 tools/prepare_audio_assets.py

      - name: Import Godot assets
        run: godot --headless --path . --import

      - name: Export Windows Desktop build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p builds/Windows
          godot --headless --path . --export-release "Windows Desktop" builds/Windows/TitanCraft.exe 2>&1 | tee builds/Windows/export.log
          test -f builds/Windows/TitanCraft.exe

      - name: Hash exported executable
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/release/hash_artifact.py builds/Windows/TitanCraft.exe | tee builds/Windows/TitanCraft.exe.sha256.txt
          {
            echo "# TitanCraft Windows MVP Export Artifact"
            echo
            echo "Workflow: TitanCraft Windows MVP Export"
            echo "Artifact: windows-mvp-export"
            echo "Executable: builds/Windows/TitanCraft.exe"
            echo "Export log: builds/Windows/export.log"
            echo
            echo "## Hash metadata"
            echo
            cat builds/Windows/TitanCraft.exe.sha256.txt
            echo
            echo "## Non-claims"
            echo
            echo "Creating a CI Windows export artifact does not prove Windows readiness."
            echo "Manual Windows playtest is still required."
            echo "Visual approval is separate."
            echo "Gameplay feel approval is separate."
            echo "Public demo readiness is not claimed."
          } > builds/Windows/windows-mvp-export-summary.md

      - name: Upload Windows MVP export artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-mvp-export
          if-no-files-found: error
          path: |
            builds/Windows/**
