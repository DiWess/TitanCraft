name: MVP Phase 4–6 Auto-Forge & Commit

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  push:
    branches:
      - 'claude/art-docs-phases-*'
    paths:
      - 'docs/art/briefs/brief-*.md'
      - 'tools/blender/create_mvp_asset_pack_v1.py'
      - '.github/workflows/mvp-phase-4-6-asset-auto-forge.yml'

jobs:
  generate-phase-4-6-assets:
    name: Generate Phase 4–6 MVP Assets & Commit
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Blender & dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y blender python3-numpy libegl1 xvfb
          blender --version

      - name: Create directory structure
        run: |
          mkdir -p assets/Source/Blender/Production/MVP_Pack_V1
          mkdir -p assets/Production/Generated/MVP_Pack_V1
          mkdir -p artifacts/asset-review

      - name: Generate MVP Asset Pack V1 Blender sources (Phase 4–6)
        run: |
          echo "=== Generating Phase 4–6 Blender sources ==="
          blender --background --python tools/blender/create_mvp_asset_pack_v1.py
          ls -lah assets/Source/Blender/Production/MVP_Pack_V1/

      - name: Validate Blender sources
        run: |
          echo "=== Validating Blender sources ==="
          for blend in assets/Source/Blender/Production/MVP_Pack_V1/*.blend; do
            echo "Validating: $(basename "$blend")"
            python3 tools/blender/validate_blender_asset.py "$blend" || exit 1
          done

      - name: Export MVP Asset Pack V1 to GLB format
        run: |
          echo "=== Exporting Phase 4–6 assets to GLB ==="
          for blend in assets/Source/Blender/Production/MVP_Pack_V1/*.blend; do
            name="$(basename "$blend" .blend)"
            echo "Exporting: $name"
            blender --background --python tools/blender/export_asset.py -- "$blend" "assets/Production/Generated/MVP_Pack_V1/$name.glb" || exit 1
          done
          echo "=== GLB exports complete ==="
          ls -lah assets/Production/Generated/MVP_Pack_V1/

      - name: Render asset review turntables
        run: |
          echo "=== Rendering asset review turntables ==="
          for blend in assets/Source/Blender/Production/MVP_Pack_V1/*.blend; do
            name="$(basename "$blend" .blend)"
            echo "Rendering turntable: $name"
            mkdir -p "artifacts/asset-review/$name"
            blender --background --python tools/blender/render_mvp_asset_review.py -- "$blend" "artifacts/asset-review/$name" || true
          done
          echo "=== Turntable renders complete ==="

      - name: Build asset manifest
        run: |
          echo "=== Building asset manifest ==="
          python3 tools/blender/build_asset_manifest.py
          echo "=== Manifest updated ==="
          cat assets/Production/Generated/asset_manifest.json | head -50

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet assets/Production/Generated/MVP_Pack_V1/ assets/Production/Generated/asset_manifest.json artifacts/asset-review/ 2>/dev/null; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in generated assets"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in generated assets"
            git diff --name-only assets/Production/Generated/MVP_Pack_V1/ assets/Production/Generated/asset_manifest.json || true
          fi

      - name: Configure Git
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "claude@anthropic.com"
          git config --local user.name "Claude Code Auto-Forge"

      - name: Stage generated assets
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "=== Staging generated assets ==="
          git add assets/Production/Generated/MVP_Pack_V1/*.glb
          git add assets/Production/Generated/asset_manifest.json
          git add artifacts/asset-review/
          git status --short

      - name: Commit generated assets
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "=== Committing Phase 4–6 auto-generated assets ==="
          git commit -m "Auto-forge: Generate Phase 4–6 MVP assets (Blender)

Phase 4–6 Auto-Generated Assets:
- TC_PICKUP_Metal_V1.glb
- TC_PICKUP_Biomass_V1.glb
- TC_PICKUP_Electronics_V1.glb
- TC_PICKUP_Component_V1.glb
- TC_CHAR_GalaxabrainScout_V1.glb
- TC_PLAYER_MechanicalArm_V1.glb
- TC_PROP_SavePoint_V1.glb
- TC_PROP_Workbench_V1.glb
- TC_PROP_Beacon_Dormant_V1.glb
- TC_PROP_Beacon_Active_V1.glb
- Plus asset manifest and review turntables

All assets generated via Blender 4.0+ via:
  blender --background --python tools/blender/create_mvp_asset_pack_v1.py

Ready for Phase 7 scene composition.

This is an automated commit from GitHub Actions.
Triggered by: MVP Phase 4–6 Auto-Forge workflow" || echo "No changes to commit"

      - name: Push generated assets to branch
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "=== Pushing generated assets ==="
          git push -u origin HEAD:${{ github.ref_name }} || echo "Push failed or no upstream"
          echo "=== Push complete ==="

      - name: Report asset generation status
        if: always()
        run: |
          echo "=== PHASE 4–6 ASSET GENERATION STATUS ==="
          echo "Branch: ${{ github.ref_name }}"
          echo "Changes detected: ${{ steps.check_changes.outputs.has_changes }}"
          echo ""
          echo "Generated assets:"
          ls -lah assets/Production/Generated/MVP_Pack_V1/ || echo "No GLB files found"
          echo ""
          echo "Asset manifest entries:"
          python3 -c "
          import json
          try:
            with open('assets/Production/Generated/asset_manifest.json') as f:
              manifest = json.load(f)
              for asset in manifest.get('assets', []):
                if 'Phase' in asset.get('phase', 0) and asset['phase'] >= 4 and asset['phase'] <= 6:
                  print(f\"  ✓ {asset['name']} ({asset['poly_count']} polys)\")
          except:
            print('  (manifest not found or parse error)')
          " || echo "Could not parse manifest"
          echo ""
          echo "=== Asset generation complete ==="

      - name: Create summary artifact
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: phase-4-6-assets-generated
          path: |
            assets/Production/Generated/MVP_Pack_V1/
            assets/Production/Generated/asset_manifest.json
          retention-days: 30

      - name: Notify completion
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          cat > /tmp/completion_status.txt << 'EOF'
          ✅ Phase 4–6 Assets Auto-Generated Successfully

          All 12 MVP assets generated and committed:
          - 4 Resource Pickups (Metal, Biomass, Electronics, Component)
          - 1 Enemy (Scout)
          - 1 Player Equipment (Mechanical Arm)
          - 4 Interactive Props (Workbench, Beacon Dormant/Active, Save Point)

          Location: assets/Production/Generated/MVP_Pack_V1/
          Ready for: Phase 7 Scene Composition

          Next: Import GLBs into scenes/CrashSite_MVP.tscn
          EOF
          cat /tmp/completion_status.txt
