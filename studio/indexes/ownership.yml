    reviewers: [qa_lead]
    rights: agent_write
  - path: studio/decisions/**
    owner: technical_director
    reviewers: [producer, engine_architect]
    rights: agent_write
  - path: studio/prompts/**
    owner: producer
    reviewers: [qa_lead]
    rights: agent_write
  - path: studio/templates/**
    owner: producer
    reviewers: [qa_lead]
    rights: agent_write
  - path: studio/orchestration/**
    owner: producer
    reviewers: [qa_lead, technical_director]
    rights: agent_write
  - path: studio/rehearsals/**
    owner: qa_lead
    reviewers: [producer]
    rights: agent_write
  - path: studio/tasks/**
    owner: producer
    reviewers: [qa_lead]
    rights: agent_write
  - path: studio/README.md
    owner: producer
    reviewers: [qa_lead, technical_director]
    rights: agent_write

  # --- Gameplay runtime code ---
  - path: src/Player/**
    owner: gameplay_engineer
    reviewers: [engine_architect, qa_lead]
    rights: agent_write
  - path: src/Enemies/**
